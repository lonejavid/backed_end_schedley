# Netlify config for NestJS backend (Schedley API)
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "none"
  external_node_modules = ["pg", "sql.js", "bcrypt"]

# Redirect all routes to the serverless function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

# Health check route
[[redirects]]
  from = "/health"
  to = "/.netlify/functions/server/api/health"
  status = 200
  force = true